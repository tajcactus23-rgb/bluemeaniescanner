<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueMeanie Scanner - UI Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        .phone {
            width: 375px;
            height: 812px;
            background: #0a0a0f;
            border: 3px solid #00f0ff;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
        }
        
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #0a0a0f;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }
        
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: #ffffff;
            font-size: 12px;
        }
        
        .app-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }
        
        .status-badge {
            padding: 6px 12px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            border-radius: 4px;
        }
        
        .status-badge span {
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
        }
        
        .radar-container {
            display: flex;
            justify-content: center;
            padding: 30px 0;
        }
        
        .radar {
            width: 220px;
            height: 220px;
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #12121a 0%, #0a0a0f 70%);
        }
        
        .radar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff);
            transform-origin: left center;
            animation: sweep 4s linear infinite;
        }
        
        @keyframes sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .radar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(136, 136, 170, 0.2);
            border-radius: 50%;
        }
        
        .ring-1 { width: 70px; height: 70px; }
        .ring-2 { width: 140px; height: 140px; }
        .ring-3 { width: 210px; height: 210px; }
        
        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 20px #00f0ff;
        }
        
        .ping {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff88;
        }
        
        .ping-1 { top: 30%; left: 60%; }
        
        .stats-row {
            display: flex;
            gap: 12px;
            padding: 0 20px;
        }
        
        .stat-card {
            flex: 1;
            background: #12121a;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
        }
        
        .stat-card .icon {
            color: #00aaff;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .stat-card .label {
            font-size: 12px;
            color: #8888aa;
            margin-top: 4px;
        }
        
        .scan-button {
            margin: 24px 20px;
            padding: 16px;
            background: rgba(0, 240, 255, 0.2);
            border: 2px solid #00f0ff;
            border-radius: 8px;
            text-align: center;
        }
        
        .scan-button span {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #00f0ff;
            letter-spacing: 2px;
        }
        
        .signal-zones {
            padding: 0 20px;
        }
        
        .signal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: #8888aa;
            margin-bottom: 12px;
        }
        
        .zones-display {
            display: flex;
            justify-content: center;
            padding: 10px 0;
            position: relative;
        }
        
        .zone-ring {
            position: absolute;
            border: 2px solid;
            border-radius: 50%;
            opacity: 0.3;
        }
        
        .zone-strong {
            width: 60px; height: 60px;
            border-color: #00ff88;
        }
        
        .zone-medium {
            width: 110px; height: 110px;
            border-color: #00aaff;
        }
        
        .zone-weak {
            width: 160px; height: 160px;
            border-color: #ff8800;
        }
        
        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #12121a;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8888aa;
            font-size: 10px;
        }
        
        .nav-item.active {
            color: #00f0ff;
        }
        
        .nav-item .icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .glow-animation {
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 10px #00f0ff; }
            to { box-shadow: 0 0 30px #00f0ff, 0 0 60px #00f0ff; }
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        
        <div class="app-header">
            <div class="app-title">BlueMeanie</div>
            <div class="status-badge">
                <span>SCANNING</span>
            </div>
        </div>
        
        <div class="radar-container">
            <div class="radar">
                <div class="radar-ring ring-1"></div>
                <div class="radar-ring ring-2"></div>
                <div class="radar-ring ring-3"></div>
                <div class="radar-center"></div>
                <div class="ping ping-1"></div>
            </div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="icon">📡</div>
                <div class="value">3</div>
                <div class="label">Devices Found</div>
            </div>
            <div class="stat-card">
                <div class="icon">📶</div>
                <div class="value">-58</div>
                <div class="label">Strongest</div>
            </div>
        </div>
        
        <div class="scan-button">
            <span>STOP SCAN</span>
        </div>
        
        <div class="signal-zones">
            <div class="signal-title">SIGNAL ZONES</div>
            <div class="zones-display">
                <div class="zone-ring zone-strong"></div>
                <div class="zone-ring zone-medium"></div>
                <div class="zone-ring zone-weak"></div>
            </div>
        </div>
        
        <div class="nav-bar">
            <div class="nav-item active">
                <div class="icon">📡</div>
                <span>Dashboard</span>
            </div>
            <div class="nav-item">
                <div class="icon">📋</div>
                <span>Log</span>
            </div>
            <div class="nav-item">
                <div class="icon">📊</div>
                <span>Summary</span>
            </div>
            <div class="nav-item">
                <div class="icon">🏆</div>
                <span>Score</span>
            </div>
            <div class="nav-item">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>
    </div>
</body>
</html>
