name: bluemeanie_scanner
description: Internal BLE Axon device scanner for security team coordination
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.32.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_local_notifications: ^16.3.0
  fl_chart: ^0.65.0
  audioplayers: ^5.2.1
  sensor_plus: ^4.0.1
  permission_handler: ^11.1.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true