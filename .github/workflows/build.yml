name: Android Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v2
      - name: Build
        run: |
          chmod +x gradlew
          # Download proper wrapper jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          # Fix gradle wrapper properties for GitHub Actions
          sed -i 's/distributionBase=project/distributionBase=ALL/' gradle/wrapper/gradle-wrapper.properties
          sed -i 's/zipStoreBase=project/zipStoreBase=ALL/' gradle/wrapper/gradle-wrapper.properties
          # Set ANDROID_HOME
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -60
        env:
          ANDROID_HOME: /opt/android-sdk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ble-guard-debug
          path: app/build/outputs/apk/debug/app-debug.apk