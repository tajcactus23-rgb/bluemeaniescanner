name: Android Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v2
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
      - name: Debug output
        run: |
          echo "=== BUILD LOG ==="
          tail -100 build.log
          echo "=== APK CHECK ==="
          find . -name "*.apk" 2>/dev/null || true
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "NO APK"
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ble-guard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
